    const baseline = simulatePayoff(loans, 0, 'avalanche');
    const scenario = simulatePayoff(loans, amount, 'avalanche');
    const monthsSaved = baseline.months - scenario.months;
    const interestSaved = baseline.totalInterest - scenario.totalInterest;
    resultEl.innerHTML = `<p class="insight-text">Paying an extra ${fmt(amount)}/month toward loans (avalanche order) could move payoff up by about ${monthsSaved} month${monthsSaved!==1?'s':''}, saving roughly ${fmt(Math.max(0,interestSaved))} in interest.</p>
      <p class="fine-print" style="padding:0;">Baseline payoff: ${Math.floor(baseline.months/12)}y ${baseline.months%12}m. With extra: ${Math.floor(scenario.months/12)}y ${scenario.months%12}m.</p>`;
  } else {
    const topGoal = d.goals[0];
    const yearTotal = amount * 12;
    let goalText = '';
    if (topGoal) {
      const remaining = Math.max(0, Number(topGoal.target) - Number(topGoal.current));
      const monthsToGoal = remaining > 0 ? Math.ceil(remaining / amount) : 0;
      goalText = ` At that pace alone, ${esc(topGoal.name)} (${fmt(remaining)} to go) would take about ${monthsToGoal} month${monthsToGoal!==1?'s':''} — assuming no other contributions.`;
    }
    resultEl.innerHTML = `<p class="insight-text">Saving an extra ${fmt(amount)}/month adds up to about ${fmt(yearTotal)} over a year.${goalText}</p>`;
  }
}
function renderAnalytics() {
  const d = state.data, viewMonth = state.analyticsMonth, mk = monthKey(viewMonth);
  const isCurrentMonth = mk === monthKey(new Date());
  const prevMonthDate = addMonths(viewMonth, -1), prevMK = monthKey(prevMonthDate);

  const spentThis = categorySpend(mk, d), spentPrev = categorySpend(prevMK, d);
  const totalThis = Object.values(spentThis).reduce((a,b)=>a+b,0);
  const totalPrev = Object.values(spentPrev).reduce((a,b)=>a+b,0);
  const incomeThis = monthIncome(mk, d), incomePrev = monthIncome(prevMK, d);
  const rateThis = incomeThis > 0 ? ((incomeThis - totalThis) / incomeThis * 100) : null;
  const billsPaidThis = d.transactions.filter(t => t.source === 'bill' && monthKey(new Date(t.date)) === mk);
  const billsPaidThisTotal = billsPaidThis.reduce((s,t) => s + Number(t.amount||0), 0);
  const topCats = Object.entries(spentThis).sort((a,b) => b[1]-a[1]).slice(0,5);

  const changes = Object.keys({...spentThis, ...spentPrev})
    .map(cat => {
      const cur = spentThis[cat]||0, prev = spentPrev[cat]||0, budget = (d.budgets||{})[cat];
      return { cat, cur, prev, delta: cur - prev, overBudget: budget && cur > budget, budget };
    })
    .filter(x => x.cur > 0 || x.prev > 0)
    .sort((a,b) => b.delta - a.delta);
  const risers = changes.filter(x => x.delta > 0).slice(0, 3);
  const overBudgetNow = changes.filter(x => x.overBudget);

  const loanTotal = d.loans.reduce((s,l) => s + Number(l.balance||0), 0);
  const loanPaymentsThis = (d.loanPayments||[]).filter(p => monthKey(new Date(p.date)) === mk);
  const interestPaidThis = loanPaymentsThis.reduce((s,p) => s + Number(p.interest||0), 0);
  const principalPaidThis = loanPaymentsThis.reduce((s,p) => s + Number(p.principal||0), 0);

  const subMonthlyTotal = (d.subscriptions||[]).filter(s => s.cycle === 'monthly').reduce((s,x) => s + Number(x.cost||0), 0);

  const sentences = [];
  if (incomeThis > 0) {
    sentences.push(`In ${monthName(viewMonth)}${isCurrentMonth ? ' so far' : ''}, you brought in ${fmt(incomeThis)} and spent ${fmt(totalThis)}${rateThis !== null ? `, a savings rate of ${rateThis.toFixed(0)}%` : ''}.`);
  } else if (totalThis > 0) {
    sentences.push(`In ${monthName(viewMonth)}${isCurrentMonth ? ' so far' : ''}, you spent ${fmt(totalThis)}. No paychecks were logged that month, so a savings rate can't be calculated.`);
  }
  if (totalPrev > 0 && totalThis > 0) {
    const diff = totalThis - totalPrev;
    sentences.push(`That's ${diff >= 0 ? 'up' : 'down'} ${fmt(Math.abs(diff))} from ${monthName(prevMonthDate)}.`);
  }
  if (topCats.length) {
    sentences.push(`Biggest categories: ${topCats.slice(0,3).map(([c,a]) => `${c} (${fmt(a)})`).join(', ')}.`);
  }
  if (billsPaidThis.length) {
    sentences.push(`${billsPaidThis.length} bill${billsPaidThis.length!==1?'s':''} totaling ${fmt(billsPaidThisTotal)} ${billsPaidThis.length!==1?'were':'was'} paid through the app.`);
  }
  if (loanPaymentsThis.length) {
    sentences.push(`Loan payments moved ${fmt(principalPaidThis)} to principal and ${fmt(interestPaidThis)} to interest.`);
  }
  if (subMonthlyTotal > 0) {
    sentences.push(`Active monthly subscriptions currently total ${fmt(subMonthlyTotal)}/mo.`);
  }
  if (!sentences.length) sentences.push(`Not enough data logged for ${monthName(viewMonth)} yet — keep tracking and it'll fill in.`);

  const nwHistory = netWorthHistory(5);
  const spendHistory = spendingTrend(5);
  const nwDelta = nwHistory.length > 1 ? nwHistory[nwHistory.length-1].value - nwHistory[0].value : 0;

  return `
    <div class="tab-header"><div><h2>Analytics</h2><p class="tab-sub">Trends &amp; monthly recap</p></div>
      ${monthNav(viewMonth, 'shiftAnalyticsMonth')}</div>
    ${renderInsights()}

    <div class="section">
      <div class="section-head"><h4>${monthName(viewMonth)}${isCurrentMonth ? ' (so far)' : ''}</h4></div>
      ${sentences.map(s => `<p class="insight-text">${s}</p>`).join('')}
      ${risers.length ? `<div class="register">${risers.map(r => `
        <div class="register-row"><div class="register-left"><div class="register-title">${esc(r.cat)}</div><div class="register-sub">${fmt(r.prev)} prior month &#8594; ${fmt(r.cur)} this month</div></div><div class="register-leader"></div><div class="register-right" style="color:var(--rust)">+${fmtShort(r.delta)}</div></div>`).join('')}</div>` : ''}
      ${overBudgetNow.length ? `<p class="insight-text" style="color:var(--rust)">Over budget: ${overBudgetNow.map(x => `${x.cat} (${fmt(x.cur)} of ${fmt(x.budget)})`).join(', ')}.</p>` : ''}
    </div>

    ${topCats.length ? `
    <div class="section">
      <div class="section-head"><h4>Spending by category</h4></div>
      ${svgBarChart(topCats.map(([c,a]) => ({ label: c.length > 8 ? c.slice(0,7)+'.' : c, value: a })), { color: 'var(--green)' })}
    </div>` : ''}

    <div class="section">
      <div class="section-head"><h4>Spending, last 6 months</h4></div>
      ${svgBarChart(spendHistory, { color: 'var(--steel)' })}
    </div>

    <div class="section">
      <div class="section-head"><h4>Net worth trend</h4></div>
      ${svgLineChart(nwHistory, { color: nwDelta >= 0 ? 'var(--green)' : 'var(--rust)' })}
      <p class="fine-print" style="margin-top:6px;">${nwHistory.length > 1 ? `${nwDelta >= 0 ? 'Up' : 'Down'} ${fmt(Math.abs(nwDelta))} over this period.` : ''} Approximate — reconstructed from logged transactions, transfers, and payments. Directly editing an account or loan balance won't be reflected in past months.</p>
    </div>

    <div class="section">
      <div class="section-head"><h4>Debt</h4></div>
      <p class="insight-text">Total loan balance is ${fmt(loanTotal)}${loanPaymentsThis.length ? `, after ${fmt(principalPaidThis)} in principal paid down this month` : ''}.</p>
    </div>

    <div class="section">
      <div class="section-head"><h4>What if...?</h4></div>
      <p class="insight-text" style="margin-top:0;">Try a quick scenario — an income change, a new bill, extra toward loans, or extra savings — and see the rough effect.</p>
      <button class="btn-primary" style="margin:0; background: var(--steel)" onclick="openWhatIfSheet()">Try a scenario</button>
    </div>
  `;
}

/* ---------------- Sync ---------------- */
let pendingImport = null;
function renderNavCustomizer() {
  const pinned = getPinnedTabs();
  const rows = TABS.map(t => {
    const isPinned = pinned.includes(t.key);
    const idx = pinned.indexOf(t.key);
    return `<div class="register-row">
      <div class="register-left"><div class="register-title">${t.icon} ${esc(t.label)}</div></div>
      <div class="register-leader"></div>
      <div style="display:flex; gap:4px; align-items:center; flex-shrink:0;">
        ${isPinned ? `
          <button class="icon-btn" style="width:26px;height:26px;font-size:11px;" onclick="moveNavPin('${t.key}',-1)" ${idx===0?'disabled':''}>&#8593;</button>
          <button class="icon-btn" style="width:26px;height:26px;font-size:11px;" onclick="moveNavPin('${t.key}',1)" ${idx===pinned.length-1?'disabled':''}>&#8595;</button>
        ` : ''}
        <button class="icon-btn" style="width:26px;height:26px;font-size:12px;${isPinned?`background:var(--green);color:var(--tape-text);border-color:var(--green);`:''}" onclick="toggleNavPin('${t.key}')">${isPinned ? '&#10003;' : '&#43;'}</button>
      </div>
    </div>`;
  }).join('');
  return `<div class="register">${rows}</div>`;
}
function renderSync() {
  return `
    <div class="tab-header"><div><h2>Settings</h2><p class="tab-sub">Help, appearance &amp; backup</p></div></div>
    <div class="section">
      <div class="section-head"><h4>Help &amp; Getting Started</h4></div>
      <button class="btn-primary" style="margin:0 0 12px;" onclick="showOnboarding()">View tutorial</button>
      <p class="insight-text" style="margin-top:0;">Quick map of the app: <strong>Accounts</strong> hold your balances. <strong>Bills</strong>, <strong>Subscriptions</strong>, and loan payments reduce them; <strong>Paycheck</strong> and deposits add to them. <strong>Spending</strong> just records what money went to. <strong>Savings</strong>, <strong>Loans</strong>, and <strong>Taxes</strong> are their own tools, and <strong>Analytics</strong> ties it all together.</p>
      <details class="help-item">
        <summary>Bill vs. Subscription</summary>
        <p>A Bill is any recurring or one-time charge — rent, utilities, a loan payment. A Subscription is specifically for services with a trial or renewal you want cancel-by reminders for. Monthly subscriptions can also generate a linked Bill so the charge shows up in Spending too.</p>
      </details>
      <details class="help-item">
        <summary>Autopay</summary>
        <p>Marking a bill as autopay doesn't charge anything automatically — it just makes the app prompt you to confirm once the due date arrives, so you can check it off (or say "not yet") without hunting for it.</p>
      </details>
      <details class="help-item">
        <summary>Linked bills &amp; subscriptions</summary>
        <p>A loan or subscription can generate its own recurring Bill entry, tagged LOAN or SUB. Paying that bill deducts the full amount from your account like normal — the link just saves you from entering the same charge twice.</p>
      </details>
      <details class="help-item">
        <summary>Loan payments</summary>
        <p>Each linked loan payment is automatically split into principal and interest based on the loan's current rate and balance. Only the interest portion is really a "cost" — principal is just converting cash into reduced debt.</p>
      </details>
      <details class="help-item">
        <summary>What Analytics means</summary>
        <p>Analytics recaps a chosen month, compares it to the one before, and charts trends. Net worth history is reconstructed from your logged activity, not tracked separately — see the note on that chart for its limits.</p>
      </details>
    </div>
    <div class="section">
      <div class="section-head"><h4>Customize navigation</h4></div>
      <p class="fine-print" style="padding:0; margin-top:0;">Choose up to ${MAX_PINNED} tabs to pin in the bottom bar (at least 1 required). Everything else lives under More.</p>
      ${renderNavCustomizer()}
    </div>
    <div class="section">
      <div class="section-head"><h4>Appearance</h4></div>
      <div class="segmented">
        <button type="button" class="${themePref==='light'?'seg-active':''}" onclick="setTheme('light')">Light</button>
        <button type="button" class="${themePref==='dark'?'seg-active':''}" onclick="setTheme('dark')">Dark</button>
        <button type="button" class="${themePref==='system'?'seg-active':''}" onclick="setTheme('system')">System</button>
      </div>
    </div>
    <div class="section">
      <div class="section-head"><h4>Lock</h4></div>
      ${hasPinSet() ? `
        <p class="fine-print" style="padding:0; margin-top:0;">A PIN is set on this device — it's asked for every time the app is opened.</p>
        <div style="display:flex; gap:8px; margin-top:8px;">
          <button class="btn-primary" style="margin:0; background: var(--steel)" onclick="openPinSheet('change')">Change PIN</button>
          <button class="btn-danger" onclick="openPinSheet('remove')">Remove</button>
        </div>
      ` : `
        <p class="fine-print" style="padding:0; margin-top:0;">Add a PIN so the app asks for a code each time it's opened. This is a simple local deterrent, not real encryption — it won't stop someone determined with developer tools, so don't rely on it for highly sensitive protection.</p>
        <button class="btn-primary" style="margin-top:8px" onclick="openPinSheet('set')">Set a PIN</button>
      `}
    </div>
    <p class="fine-print" style="margin-top:0">This app stores everything locally on this device only — there's no server, so nothing syncs automatically between your phone and PC. To move your data, export a backup here, then import it on the other device.</p>
    <div class="section">
      <div class="section-head"><h4>Export</h4></div>
      <button class="btn-primary" style="margin:0" onclick="exportData()">&#11015; Download backup file</button>
      <p class="fine-print" style="padding:0; margin-top:10px">If the download button doesn't do anything, use the text box instead — tap in, select all, and copy.</p>
      <button class="btn-primary" style="margin:10px 0 0; background: var(--steel)" onclick="showExportText()">Show as text to copy</button>
      <div id="export-text-wrap"></div>
    </div>
    <div class="section">
      <div class="section-head"><h4>Import</h4></div>
      <input type="file" id="import-file" accept="application/json" style="display:none" onchange="importData(event)">
      <button class="btn-primary" style="margin:0; background: var(--steel)" onclick="document.getElementById('import-file').click()">&#11014; Load backup file</button>
      <p class="fine-print" style="padding:0; margin-top:10px">Or paste a backup you copied as text:</p>
      <textarea id="import-paste" class="input mono" style="height:100px; resize:vertical;" placeholder="Paste backup JSON here"></textarea>
      <button class="btn-primary" style="margin:10px 0 0" onclick="importPastedText()">Import pasted text</button>
      <div id="import-confirm-area"></div>
      <div id="sync-status" style="font-size:12.5px; margin-top:10px; min-height:16px;"></div>
    </div>
    <div class="section">
      <div class="section-head"><h4>Danger zone</h4></div>
      <div style="border: 1px solid var(--rust); border-radius: 4px; padding: 12px 14px;">
        <p class="fine-print" style="padding:0; margin-top:0;">Wipes every account, bill, transaction, loan, subscription, and goal on this device — useful for starting fresh or handing a blank copy to someone else. Your PIN and appearance setting aren't touched; remove those separately above if needed.</p>
        <button class="btn-danger" style="margin-top:8px;" onclick="openClearAllSheet()">Clear all data</button>
      </div>
    </div>
  `;
}
function openClearAllSheet() {
  const html = `
    <div class="sheet-handle"></div>
    <div class="sheet-title-row"><h3 class="sheet-title">Clear all data</h3><button class="icon-btn" onclick="closeSheet()">&#10005;</button></div>
    <p class="insight-text" style="margin-top:0; color:var(--rust);">This permanently deletes every account, bill, transaction, loan, subscription, goal, and history entry stored on this device. It cannot be undone.</p>
    <p class="fine-print" style="padding:0;">Consider exporting a backup first, from Export above.</p>
    <button class="btn-danger" style="width:100%; justify-content:center; margin-top:6px;" onclick="confirmClearAll()">Yes, delete everything</button>
  `;
  openSheet(html);
}
function confirmClearAll() {
  state.data = JSON.parse(JSON.stringify(DEFAULT_DATA));
  saveData();
  closeSheet();
  renderAll();
}
function setSyncStatus(msg, isError) {
  const el = document.getElementById('sync-status');
  if (el) { el.textContent = msg; el.style.color = isError ? '#A13D2C' : '#2E5E45'; }
}
function showExportText() {
  const json = JSON.stringify(state.data, null, 2);
  document.getElementById('export-text-wrap').innerHTML = `
    <textarea class="input mono" style="height:140px; resize:vertical; margin-top:10px;" readonly onclick="this.select()">${esc(json)}</textarea>
    <button class="btn-primary" style="margin:10px 0 0; background: var(--steel)" onclick="copyExportText()">Copy to clipboard</button>
  `;
}
function copyExportText() {
  const ta = document.querySelector('#export-text-wrap textarea');
  ta.select();
  ta.setSelectionRange(0, 999999);
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(ta.value)
      .then(() => setSyncStatus('Copied to clipboard.', false))
      .catch(() => setSyncStatus("Could not auto-copy — the text is selected, so use your device's copy command.", false));
  } else {
    setSyncStatus("The text is selected — use your device's copy command.", false);
  }
}
function exportData() {
  const blob = new Blob([JSON.stringify(state.data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `ledger-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  setSyncStatus('If your browser allows downloads here, check your Downloads folder.', false);
}
function showImportConfirm(parsed, sourceLabel) {
  pendingImport = parsed;
  const counts = ['accounts','bills','transactions','goals','loans','paychecks'].map(k => `${(parsed[k]||[]).length} ${k}`).join(', ');
  document.getElementById('import-confirm-area').innerHTML = `
    <div class="fine-print" style="color:var(--rust); padding:0; margin-top:10px;">Loaded from ${sourceLabel}: ${counts}. This will replace everything currently on this device.</div>
    <button class="btn-danger" style="width:100%; justify-content:center; margin-top:8px;" onclick="confirmImport()">Yes, replace my data</button>
  `;
  setSyncStatus('', false);
}
function confirmImport() {
  if (!pendingImport) return;
  state.data = Object.assign({}, DEFAULT_DATA, pendingImport);
  pendingImport = null;
  saveData();
  renderAll();
}
function importPastedText() {
  const raw = document.getElementById('import-paste').value.trim();
  if (!raw) { setSyncStatus('Paste a backup into the box first.', true); return; }
  try {
    const parsed = JSON.parse(raw);
    showImportConfirm(parsed, 'pasted text');
  } catch (e) {
    setSyncStatus('Could not read that text — make sure you pasted the whole backup.', true);
  }
}
function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      showImportConfirm(parsed, file.name);
    } catch (e) {
      setSyncStatus("Could not read that file — make sure it's a backup exported from this app.", true);
    }
    event.target.value = '';
  };
  reader.onerror = () => setSyncStatus('Could not read that file from this device.', true);
  reader.readAsText(file);
}

/* ---------------- lock ---------------- */
const PIN_KEY = 'ledger-pin-hash';
function simpleHash(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) { h = (h * 31 + str.charCodeAt(i)) >>> 0; }
  return h.toString(36);
}
function getPinHash() { try { return localStorage.getItem(PIN_KEY) || ''; } catch (e) { return ''; } }
function hasPinSet() { return !!getPinHash(); }
function attemptUnlock() {
  const val = document.getElementById('lock-input').value.trim();
  if (val && simpleHash(val) === getPinHash()) {
    document.getElementById('lock-screen').classList.add('hidden');
    afterUnlock();
  } else {
    document.getElementById('lock-error').textContent = 'Incorrect PIN.';
    document.getElementById('lock-input').value = '';
    document.getElementById('lock-input').focus();
  }
}
function openPinSheet(mode) {
  const body = `
    ${mode !== 'set' ? `<div class="field"><span class="field-label">Current PIN</span><input class="input mono" type="tel" inputmode="numeric" id="pin-current" placeholder="****"></div>` : ''}
    ${mode !== 'remove' ? `
    <div class="field"><span class="field-label">New PIN (4+ digits)</span><input class="input mono" type="tel" inputmode="numeric" id="pin-new" placeholder="****"></div>
    <div class="field"><span class="field-label">Confirm new PIN</span><input class="input mono" type="tel" inputmode="numeric" id="pin-confirm" placeholder="****"></div>` : ''}
    <div id="pin-error" class="fine-print" style="color:var(--rust); padding:0;"></div>
  `;
  openSheet(sheetShell(mode==='set' ? 'Set a PIN' : mode==='change' ? 'Change PIN' : 'Remove PIN', body, null));
  submitSheet = () => submitPin(mode);
}
function submitPin(mode) {
  const errEl = document.getElementById('pin-error');
  const existingHash = getPinHash();
  if (mode !== 'set') {
    const cur = document.getElementById('pin-current').value;
    if (simpleHash(cur) !== existingHash) { errEl.textContent = 'Current PIN is incorrect.'; return; }
  }
  if (mode === 'remove') {
    try { localStorage.removeItem(PIN_KEY); } catch (e) {}
    closeSheet(); renderAll(); return;
  }
  const n1 = document.getElementById('pin-new').value;
  const n2 = document.getElementById('pin-confirm').value;
  if (n1.length < 4) { errEl.textContent = 'Use at least 4 digits.'; return; }
  if (n1 !== n2) { errEl.textContent = "PINs don't match."; return; }
  try { localStorage.setItem(PIN_KEY, simpleHash(n1)); } catch (e) {}
  closeSheet(); renderAll();
}

/* ---------------- init ---------------- */
if (hasPinSet()) {
  document.getElementById('lock-screen').classList.remove('hidden');
  document.getElementById('lock-input').focus();
} else {
  afterUnlock();
}
</script>
